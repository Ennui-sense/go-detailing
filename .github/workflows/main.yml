name: Deploy site from Strapi webhook

on:
  repository_dispatch:
    types: [strapi-content-changed]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build app
        run: npx react-router build
        working-directory: client
        env:
          NODE_ENV: production
          VITE_STRAPI_URL: ${{ secrets.VITE_STRAPI_URL }}

      - name: Debug local build contents
        run: |
          echo "PWD=$(pwd)"
          echo "=== build/client ==="
          ls -la build/client
          echo "=== recursive ==="
          find build/client -maxdepth 2 | sort
        working-directory: client

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.REG_RU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 "${{ secrets.REG_RU_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload site
        run: |
          rsync -avz --delete \
            -e "ssh -p 22" \
            client/build/client/ \
            "${{ secrets.REG_RU_USER }}@${{ secrets.REG_RU_HOST }}:${{ secrets.REG_RU_TARGET_PATH }}/"

      - name: Debug remote contents
        run: |
          ssh -p 22 "${{ secrets.REG_RU_USER }}@${{ secrets.REG_RU_HOST }}" \
            "echo 'TARGET=${{ secrets.REG_RU_TARGET_PATH }}' && ls -la '${{ secrets.REG_RU_TARGET_PATH }}' && find '${{ secrets.REG_RU_TARGET_PATH }}' -maxdepth 2 | sort"

      - name: Upload .htaccess
        run: |
          cat > .htaccess <<'EOF'
          DirectoryIndex index.html

          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            RewriteRule ^index\.html$ - [L]

            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]

            RewriteRule ^ /index.html [L]
          </IfModule>
          EOF

          scp -P 22 .htaccess \
            "${{ secrets.REG_RU_USER }}@${{ secrets.REG_RU_HOST }}:${{ secrets.REG_RU_TARGET_PATH }}/.htaccess"
