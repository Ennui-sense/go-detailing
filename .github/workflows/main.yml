name: Deploy site from Strapi webhook

on:
  repository_dispatch:
    types: [strapi-content-changed]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx react-router build
        env:
          NODE_ENV: production
          VITE_STRAPI_URL: ${{ secrets.VITE_STRAPI_URL }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.REG_RU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.REG_RU_PORT }}" "${{ secrets.REG_RU_HOST }}" >> ~/.ssh/known_hosts
        working-directory: .

      - name: Upload site
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.REG_RU_PORT }}" \
            ./client/build/client/ \
            "${{ secrets.REG_RU_USER }}@${{ secrets.REG_RU_HOST }}:${{ secrets.REG_RU_TARGET_PATH }}/"
        working-directory: .

      - name: Upload .htaccess
        run: |
          cat > .htaccess <<'EOF'
          DirectoryIndex index.html

          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            RewriteRule ^index\.html$ - [L]

            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]

            RewriteRule ^ /index.html [L]
          </IfModule>
          EOF

          scp -P "${{ secrets.REG_RU_PORT }}" .htaccess \
            "${{ secrets.REG_RU_USER }}@${{ secrets.REG_RU_HOST }}:${{ secrets.REG_RU_TARGET_PATH }}/.htaccess"
        working-directory: .
